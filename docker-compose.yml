version: "3.9"

x-backend-env: &backend-env
  env_file: ./backend/.env

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dating
      POSTGRES_PASSWORD: dating
      POSTGRES_DB: dating
    volumes:
      - ./var/postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating -d dating"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniochange
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./var/minio-data:/data

  migrate:
    build:
      context: ./backend
      dockerfile: migrate/Dockerfile
    # Only DB URL in the container (no backend/.env). Default matches `postgres` above;
    # override via root `.env` or `docker compose --env-file backend/.env` interpolation.
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://dating:dating@postgres:5432/dating}
    working_dir: /app
    volumes:
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/shared:/app/shared
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    <<: *backend-env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  behavior_consumer:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    <<: *backend-env
    volumes:
      - ./backend:/app
    command: ["python", "-m", "workers.behavior_consumer"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    <<: *backend-env
    volumes:
      - ./backend:/app
    command:
      ["celery", "-A", "workers.celery_app:celery_app", "worker", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    <<: *backend-env
    volumes:
      - ./backend:/app
    command:
      ["celery", "-A", "workers.celery_app:celery_app", "beat", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  bot:
    build:
      context: ./backend
      dockerfile: bot/Dockerfile
    <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
