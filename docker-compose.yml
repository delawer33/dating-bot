version: "3.9"

x-backend-env: &backend-env
  env_file: ./backend/.env

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dating
      POSTGRES_PASSWORD: dating
      POSTGRES_DB: dating
    volumes:
      - ./var/postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating -d dating"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    <<: *backend-env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command:
      [
        "uvicorn",
        "api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # migrate:
  #   build:
  #     context: ./backend
  #     dockerfile: api/Dockerfile
  #   <<: *backend-env
  #   command: ["alembic", "upgrade", "head"]
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: "no"

  bot:
    build:
      context: ./backend
      dockerfile: bot/Dockerfile
    <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
